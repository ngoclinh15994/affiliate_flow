<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ChoTot Agent</title>
    <style>
      body {
        margin: 12px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
        font-size: 13px;
        min-width: 260px;
        color: #111827;
      }

      h1 {
        font-size: 14px;
        margin: 0 0 8px;
        font-weight: 600;
      }

      p {
        margin: 0 0 10px;
        color: #4b5563;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
        border-radius: 6px;
        border: none;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
      }

      button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <h1>ChoTot Browser Agent</h1>
    <p>Chạy lại việc phát hiện selector cho trang sản phẩm mẫu.</p>
    <button id="runDiscoveryButton">Chạy selector discovery ngay</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
